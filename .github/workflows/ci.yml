name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: durable_queue
          POSTGRES_USER: durable_queue
          POSTGRES_PASSWORD: durable_queue_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U durable_queue -d durable_queue"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # 對齊 Dockerfile 的 python:3.13-slim

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r durable_queue/requirements.txt

      - name: Run migrations & tests
        env:
          POSTGRES_DB: durable_queue
          POSTGRES_USER: durable_queue
          POSTGRES_PASSWORD: durable_queue_test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          # Dummy Values: They are not used in tests
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          GOOGLE_CLIENT_ID: test.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
        run: |
          python durable_queue/manage.py test

  # 目標：確認 Dockerfile 在乾淨環境下 build 得過（A 階段不 push、不 deploy）。
  build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t durable-queue:local -f ./durable_queue/Dockerfile ./durable_queue
