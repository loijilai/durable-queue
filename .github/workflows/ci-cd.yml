name: CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: durable_queue
          POSTGRES_USER: durable_queue
          POSTGRES_PASSWORD: durable_queue_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U durable_queue -d durable_queue"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # 對齊 Dockerfile 的 python:3.13-slim

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r durable_queue/requirements.txt

      - name: Run tests
        working-directory: durable_queue
        env:
          POSTGRES_DB: durable_queue
          POSTGRES_USER: durable_queue
          POSTGRES_PASSWORD: durable_queue_test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          SECRET_KEY: test-secret-key
          # Dummy Values: They are not used in tests
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          GOOGLE_CLIENT_ID: test.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
        run: |
          python manage.py test

  # 目標：確認 Dockerfile 在乾淨環境下 build 得過（A 階段不 push、不 deploy）。
  build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t durable-queue:local -f ./durable_queue/Dockerfile ./durable_queue

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' # PR 不 deploy

    permissions:
      contents: read
      id-token: write

    # 放 job 層級，只序列化 deploy（放 workflow 層級會連 test/build 也一起 gate）。
    # 所有叫做 production-deploy 的 job，同一時間只能有一個執行
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    env:
      AWS_REGION: ap-northeast-1
      ECR_REPO: durable-queue
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::461346075470:role/durable-queue-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          ECR_URI="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}"
          docker build -t "$ECR_URI:$IMAGE_TAG" -f ./durable_queue/Dockerfile ./durable_queue
          docker push "$ECR_URI:$IMAGE_TAG"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve -var="image_tag=$IMAGE_TAG"

      - name: Roll ASGs
        run: |
          for asg in durable-queue-api durable-queue-worker; do
            aws autoscaling start-instance-refresh \
              --region "$AWS_REGION" \
              --auto-scaling-group-name "$asg" \
              --preferences '{"MinHealthyPercentage":50}'
          done
